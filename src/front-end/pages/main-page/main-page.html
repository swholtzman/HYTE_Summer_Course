<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HYTE — Home</title>

    <!-- CSS files, most-shared first. Each page lists the styles it uses. -->
    <link rel="stylesheet" href="/global.css" />
    <link rel="stylesheet" href="/front-end/common/header/header.css" />
    <link rel="stylesheet" href="/front-end/components/forms/login-form/login-form.css" />
    <link rel="stylesheet" href="/front-end/pages/main-page/main-page.css" />
  </head>

  <body>
    <!-- index.js drops the shared header in here. -->
    <div id="site-header"></div>

    <main class="page">
      <!-- main-page.js fills this depending on whether you are signed in. -->
      <div id="main-content" class="card"></div>
    </main>

    <!--
      JavaScript, loaded in order:
        1. utils (little helpers the rest of the code needs first)
        2. index.js (loads the header on every page)
        3. the login form's code
        4. this page's own code (runs everything)
    -->
    <script src="/front-end/utils/storage.js"></script>
    <script src="/front-end/utils/components.js"></script>
    <script src="/front-end/utils/api.js"></script>
    <script src="/index.js"></script>
    <script src="/front-end/components/forms/login-form/login-form.js"></script>
    <script src="/front-end/pages/main-page/main-page.js"></script>
  </body>
</html>
