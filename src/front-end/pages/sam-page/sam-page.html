<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sam's Example Page</title>

    <!--
      Two stylesheets:
      1. global.css  — the shared look of the whole app (you keep this line).
      2. sam-page.css — styles just for THIS page (this is the one you edit).
    -->
    <link rel="stylesheet" href="/front-end/styles/global.css" />
    <link rel="stylesheet" href="sam-page.css" />
  </head>

  <body>
    <main class="page">
      <div class="card">
        <!-- 👉 CHANGE THIS to your own name -->
        <h1 class="sam-title">Hi, I'm Sam! 👋</h1>

        <!-- 👉 CHANGE THIS to a sentence about you -->
        <p>This is my very first web page. It is made of only HTML and CSS — no JavaScript at all!</p>

        <!-- 👉 CHANGE the list below to your own three things -->
        <h2>Three things I like</h2>
        <ul>
          <li>Hockey</li>
          <li>The Gym</li>
          <li>Building things</li>
        </ul>

        <!-- This coloured box is styled in sam-page.css. Try changing its colour there! -->
        <p class="sam-badge">My goal: help you all learn how to build an app!</p>

        <!-- A link back to the home page. Keep this so you can get back. -->
        <p><a href="/front-end/pages/main-page/main-page.html">← Back to home</a></p>
      </div>
    </main>
  </body>
</html>
