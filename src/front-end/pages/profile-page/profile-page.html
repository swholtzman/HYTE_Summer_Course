<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HYTE — My Profile</title>

    <link rel="stylesheet" href="/global.css" />
    <link rel="stylesheet" href="/front-end/common/header/header.css" />
    <link rel="stylesheet" href="/front-end/components/forms/who-am-i/who-am-i.css" />
    <link rel="stylesheet" href="/front-end/pages/profile-page/profile-page.css" />
  </head>

  <body>
    <div id="site-header"></div>

    <main class="page">
      <div class="card">
        <!-- profile-page.js fills in the name + GitHub username here. -->
        <h1 id="profile-name"></h1>
        <p id="profile-github" class="muted"></p>

        <!-- The editable profile form is loaded into here. -->
        <div id="profile-form-slot"></div>
      </div>
    </main>

    <script src="/front-end/utils/storage.js"></script>
    <script src="/front-end/utils/components.js"></script>
    <script src="/front-end/utils/api.js"></script>
    <!--
      OPTIONAL (keeners only): to also save profiles to an online database,
      make a keener-config.js file (see utils/keener-api.js) and un-comment
      the next line so it loads BEFORE keener-api.js.
    -->
    <!-- <script src="/front-end/utils/keener-config.js"></script> -->
    <script src="/front-end/utils/keener-api.js"></script>
    <script src="/index.js"></script>
    <script src="/front-end/components/forms/who-am-i/who-am-i.js"></script>
    <script src="/front-end/pages/profile-page/profile-page.js"></script>
  </body>
</html>
