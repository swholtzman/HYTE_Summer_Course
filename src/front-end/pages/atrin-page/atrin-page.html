<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Atrin's Example Page</title>

    <!--
      Two stylesheets:
      1. global.css  — the shared look of the whole app (you keep this line).
      2. atrin-page.css — styles just for THIS page (this is the one you edit).
    -->
    <link rel="stylesheet" href="/front-end/styles/global.css" />
    <link rel="stylesheet" href="atrin-page.css" />
  </head>

  <body>
    <main class="page">
      <div class="card">
        <!-- 👉 CHANGE THIS to your own name -->
        <h1 class="atrin-title">Hi, I'm Atrin! 👋</h1>

        <!-- 👉 CHANGE THIS to a sentence about you -->
        <p>Hi! I'm Atrin and I'm excited to learn how to build web applications this summer!</p>

        <!-- 👉 CHANGE the list below to your own three things -->
        <h2>Three things I like</h2>
        <ul>
          <li>Volleyball</li>
          <li>Playing the piano</li>
          <li>Strawberries</li>
        </ul>

        <!-- This coloured box is styled in atrin-page.css. Try changing its colour there! -->
        <p class="atrin-badge">My goal: help you all learn how to build an app!</p>

        <!-- A link back to the home page. Keep this so you can get back. -->
        <p><a href="/front-end/pages/main-page/main-page.html">← Back to home</a></p>
      </div>
    </main>
  </body>
</html>
