<!--
  index.html  —  the very first page the browser looks for.

  Web servers open "index.html" automatically when you visit a site.
  Our real home page lives in front-end/pages/main-page, so this file just
  sends visitors straight there. Keeping the entry point tiny is a common,
  tidy pattern.
-->
<meta charset="utf-8" />
<title>HYTE App</title>

<!-- This line means: "immediately go to our main page." -->
<meta http-equiv="refresh" content="0; url=/front-end/pages/main-page/main-page.html" />

<p>Loading… if nothing happens, <a href="/front-end/pages/main-page/main-page.html">click here</a>.</p>
